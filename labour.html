<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Labour Team | GAVS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;}
.ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#c62828,#283593);}
.lc{background:#fff;border-radius:20px;padding:40px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.lt{font-size:20px;font-weight:800;color:#c62828;text-align:center;margin-bottom:4px;}
.ls2{font-size:12px;color:#888;text-align:center;margin-bottom:24px;}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e3eaff;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none;}
.inp:focus{border-color:#c62828;}
.lbtn{width:100%;padding:14px;background:#c62828;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.lerr{color:#c62828;font-size:12px;text-align:center;margin-top:8px;display:none;background:#ffebee;padding:8px;border-radius:8px;}
.app{display:none;flex-direction:column;height:100vh;}
.hdr{background:linear-gradient(90deg,#c62828,#283593);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.hdr-logo{width:48px;height:48px;object-fit:contain;border-radius:10px;background:#fff;padding:3px;}
.hdr-info{flex:1;}
.hdr-t{font-size:15px;font-weight:800;}
.hdr-s{font-size:10px;opacity:0.8;}
.hdr-d{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:6px 12px;}
.hdr-d input{background:transparent;border:none;color:#fff;font-size:13px;font-weight:700;outline:none;width:110px;}
.hdr-a{display:flex;gap:8px;align-items:center;}
.hbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.slbl{font-size:11px;font-weight:700;color:#c8e6c9;}
.main{display:flex;flex:1;overflow:hidden;}
.lp{width:240px;flex-shrink:0;background:#fff;border-right:1px solid #e3eaff;display:flex;flex-direction:column;overflow:hidden;}
.lph{background:#c62828;color:#fff;padding:10px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.lpc{background:rgba(255,255,255,0.2);border-radius:10px;padding:1px 8px;font-size:11px;}
.lptabs{display:flex;background:#f0f4ff;border-bottom:1px solid #e3eaff;flex-shrink:0;}
.lptab{flex:1;padding:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;border:none;background:transparent;color:#888;}
.lptab.on{color:#c62828;border-bottom:2px solid #c62828;background:#fff;}
.lps{padding:8px;border-bottom:1px solid #e3eaff;}
.lps input{width:100%;padding:7px 10px;border:1.5px solid #e3eaff;border-radius:8px;font-size:12px;outline:none;}
.lpl{flex:1;overflow-y:auto;padding:6px;}
.rh{font-size:8px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:6px 4px 3px;margin-top:4px;}
.rp{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 12px;}
.vgrid{column-width:300px;column-gap:12px;}
.vgrid>*{break-inside:avoid;display:inline-block;width:100%;margin-bottom:12px;}
.vbox{background:#fff;border:2px solid #e3eaff;border-radius:14px;}
.vbh{background:linear-gradient(90deg,#c62828,#283593);color:#fff;padding:8px 10px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:6px;}
.vbn{font-size:13px;font-weight:800;flex:1;}
.vbc{background:rgba(255,255,255,0.25);border-radius:8px;padding:1px 8px;font-size:10px;font-weight:700;}
.vbb{padding:8px;}
.dh{text-align:center;color:#bbb;font-size:11px;padding:16px;border:2px dashed #e3eaff;border-radius:8px;}
.vbox.drag-over{border-color:#c62828;box-shadow:0 0 0 3px #c6282833;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;}
.mb{background:#fff;border-radius:16px;padding:24px;width:min(360px,90vw);max-height:80vh;overflow-y:auto;}
.mtt{font-size:17px;font-weight:800;color:#c62828;text-align:center;margin-bottom:16px;}
.mbtn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.mbtn.p{background:#c62828;color:#fff;}
.mbtn.c{background:#f0f4ff;color:#555;}
#SIND{position:fixed;top:10px;right:10px;z-index:9999;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;display:none;}
</style>
</head>
<body>
<div id="SIND"></div>
<div class="ls" id="LS">
  <div class="lc">
    <div style="text-align:center;margin-bottom:20px;"><img src="gavs_logo.png" style="width:100px;height:100px;object-fit:contain;border-radius:14px;" id="logoImg"/></div>
    <div class="lt">👷 Labour Team</div>
    <div class="ls2">GAVS Staff Deployment Portal</div>
    <input class="inp" id="LU" placeholder="Username" autocomplete="off"/>
    <input class="inp" id="LP" type="password" placeholder="Password"/>
    <button class="lbtn" id="LBTN">Login</button>
    <div class="lerr" id="LERR">Incorrect credentials.</div>
  </div>
</div>
<div class="app" id="APP">
  <div class="hdr">
    <img src="gavs_logo.png" class="hdr-logo"/>
    <div class="hdr-info"><div class="hdr-t">👷 Labour Team</div><div class="hdr-s">GAVS STAFF DEPLOYMENT</div></div>
    <div class="hdr-d"><input type="date" id="DP"/></div>
    <div class="hdr-a"><span class="slbl" id="SL"></span><button class="hbtn" id="BSAVE">☁️ Save</button><button class="hbtn" id="BPDF">📄 PDF</button></div>
  </div>
  <div class="main">
    <div class="lp">
      <div class="lph">👷 Labour Team <span class="lpc" id="CNT">0</span></div>
      <div class="lptabs" id="TABS"></div>
      <div class="lps"><input type="text" id="SRCH" placeholder="Search..."/></div>
      <div class="lpl" id="LIST"></div>
    </div>
    <div class="rp"><div class="vgrid" id="GRID"></div></div>
  </div>
</div>
<div class="mo" id="MO"><div class="mb" id="MB"></div></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
var PID='labour',PLABEL='Labour Team',PCOLOR='#c62828',PICON='👷';
var DUSER='labour',DPASS='labour2024',AUSER='',APASS='';
var fbC={apiKey:'AIzaSyCm0FFi1Bddwhpn3bV0kqQrQQVGnk4Q0gg',authDomain:'gavs-50ce3.firebaseapp.com',projectId:'gavs-50ce3',storageBucket:'gavs-50ce3.firebasestorage.app',messagingSenderId:'623320363748',appId:'1:623320363748:web:d4ca87d1d0cd29e9d2b2f1'};
firebase.initializeApp(fbC);
var db=firebase.firestore();
var allS=[],allV=[],asgn={},vAsgn={},ROLES=[],VTS=[],VCO={};
var CLRS=['#0d47a1','#7b1fa2','#1b5e20','#c62828','#e65100','#283593','#ad1457','#00695c','#827717','#4e342e','#37474f','#6a1b9a','#bf360c','#1565c0','#2e7d32'];
var PVS=['Still Photography','HD Video Camera','Gimbal Video','Candid Photography','Multicam'];
var TMS=['6:00 AM','7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM','9:00 PM','10:00 PM','11:00 PM'];
var DBL=false,ST=null,curTab='staff',myAccess={roles:[],vendors:[]};
function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getD(){return g('DP').value||todayIST();}
function fd(d){if(!d)return '';var x=new Date(d+'T00:00:00');return x.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][x.getMonth()]+' '+x.getFullYear();}
function mkId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function st(t){return (t||'').replace(':00 ',' ');}
function gS(id){return allS.find(function(e){return e.id===id;});}
function gV(id){return allV.find(function(v){return v.id===id;});}
function cc(r){var i=ROLES.indexOf(r);return CLRS[i>=0?i%CLRS.length:0]||'#1565c0';}
function h2r(hex){hex=hex.replace('#','');return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}
function sm(html){g('MB').innerHTML=html;g('MO').style.display='flex';}
function cm(){g('MO').style.display='none';}
function sv(state){var l=g('SL');if(!l)return;if(state==='saving')l.textContent='☁️ Saving...';else if(state==='saved'){l.textContent='✅ Saved';setTimeout(function(){l.textContent='';},2000);}else if(state==='error')l.textContent='⚠️ Failed';}
g('MO').addEventListener('click',function(ev){if(ev.target===this)cm();});
g('LBTN').addEventListener('click',doLogin);
g('LP').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogin(){
  var u=(g('LU').value||'').trim().toLowerCase(),p=(g('LP').value||'').trim();
  var ok=(u===DUSER&&p===DPASS)||(AUSER&&u===AUSER&&p===APASS);
  if(!ok){g('LERR').style.display='block';g('LP').value='';return;}
  g('LS').style.display='none';g('APP').style.display='flex';
  g('DP').value=todayIST();
  loadData();
}
var _fbUnsub=null;
function loadData(){
  sv('saving');
  if(_fbUnsub){try{_fbUnsub();}catch(e){} _fbUnsub=null;}
  var firstLoad=true;
  _fbUnsub=db.collection('gavs_data').doc('main').onSnapshot(function(doc){
    if(!firstLoad&&doc.metadata&&doc.metadata.hasPendingWrites)return;
    if(!doc.exists){sv('error');return;}
    var d=doc.data();
    allS=(d.staff||[]).map(function(e){return{id:e.id,name:e.name,role:e.role,phone:e.phone||'',pv:e.pv||'',fixedDuty:e.fixedDuty||'6:00 AM'};});
    allV=d.venues||[];ROLES=d.roles||[];VTS=d.vendorTypesCustom||[];VCO=d.vendorCompanies||{};
    var ra=d.asgn||{};
    asgn={};Object.keys(ra).forEach(function(vid){asgn[vid]={};Object.keys(ra[vid]||{}).forEach(function(eid){var e=gS(eid);if(e)asgn[vid][eid]={emp:e,duty:ra[vid][eid]||'6:00 AM'};});});
    var rv=d.vendorAsgn||{};
    vAsgn={};Object.keys(rv).forEach(function(vid){vAsgn[vid]={};Object.keys(rv[vid]||{}).forEach(function(tid){if(Array.isArray(rv[vid][tid]))vAsgn[vid][tid]=rv[vid][tid];});});
    if(d.portalAccess&&d.portalAccess[PID])myAccess=d.portalAccess[PID];
    if(d.portalPasswords&&d.portalPasswords[PID]){APASS=d.portalPasswords[PID].password||DPASS;AUSER=d.portalPasswords[PID].username||DUSER;}
    DBL=true;
    if(firstLoad){firstLoad=false;buildTabs();}else{drawSP();drawVP();drawGrid();}
    sv('saved');
  },function(e){console.error(e);sv('error');});
}
function save(){
  if(!DBL)return;sv('saving');clearTimeout(ST);
  ST=setTimeout(function(){
    var ad={};Object.keys(asgn).forEach(function(vid){ad[vid]={};Object.keys(asgn[vid]||{}).forEach(function(eid){ad[vid][eid]=asgn[vid][eid].duty||'6:00 AM';});});
    var vd={};Object.keys(vAsgn).forEach(function(vid){vd[vid]={};Object.keys(vAsgn[vid]||{}).forEach(function(tid){if(Array.isArray(vAsgn[vid][tid]))vd[vid][tid]=vAsgn[vid][tid];});});
    db.collection('gavs_data').doc('main').update({asgn:ad,vendorAsgn:vd}).then(function(){sv('saved');}).catch(function(){sv('error');});
  },400);
}
g('BSAVE').addEventListener('click',save);
g('SRCH').addEventListener('input',function(){if(curTab==='staff')drawSP();else drawVP();});
g('DP').addEventListener('change',drawGrid);
function myS(){return allS.filter(function(e){return myAccess.roles&&myAccess.roles.indexOf(e.role)>=0;});}
function myVTs(){return VTS.filter(function(vt){return myAccess.vendors&&myAccess.vendors.indexOf(vt.id)>=0;});}
function deps(){var d={};Object.keys(asgn).forEach(function(vid){Object.keys(asgn[vid]||{}).forEach(function(eid){d[eid]=vid;});});return d;}
function buildTabs(){
  var hs=myAccess.roles&&myAccess.roles.length>0,hv=myAccess.vendors&&myAccess.vendors.length>0;
  var te=g('TABS');te.innerHTML='';
  if(hs){var b=document.createElement('button');b.className='lptab'+(curTab==='staff'?' on':'');b.textContent='👥 Staff';b.onclick=function(){curTab='staff';buildTabs();};te.appendChild(b);}
  if(hv){var b2=document.createElement('button');b2.className='lptab'+(curTab==='vendors'?' on':'');b2.textContent='📋 Vendors';b2.onclick=function(){curTab='vendors';buildTabs();};te.appendChild(b2);}
  if(!hs&&hv)curTab='vendors';
  if(curTab==='staff')drawSP();else drawVP();
  drawGrid();
}
function drawSP(){
  var el=g('LIST');if(!el)return;el.innerHTML='';
  var q=(g('SRCH').value||'').toLowerCase(),ms=myS(),d=deps();
  var cntEl=g('CNT');if(cntEl)cntEl.textContent=ms.length;
  var gr={};ms.forEach(function(e){if(q&&e.name.toLowerCase().indexOf(q)<0)return;if(!gr[e.role])gr[e.role]=[];gr[e.role].push(e);});
  Object.keys(gr).forEach(function(r){
    var c=cc(r),hdr=document.createElement('div');hdr.className='rh';hdr.style.color=c;hdr.textContent=r;el.appendChild(hdr);
    gr[r].forEach(function(e){
      var isDep=!!d[e.id];
      var card=document.createElement('div');card.draggable=!isDep;card.setAttribute('data-eid',e.id);
      card.style.cssText='background:'+c+'12;border-left:3px solid '+c+';border-bottom:1px solid '+c+'22;padding:3px 5px 3px 6px;display:flex;align-items:center;gap:4px;cursor:'+(isDep?'default':'grab')+';margin-bottom:2px;opacity:'+(isDep?'0.5':'1')+';';
      var nm=document.createElement('div');nm.style.cssText='font-size:9px;font-weight:700;color:#111;flex:1;word-break:break-word;';nm.textContent=e.name;card.appendChild(nm);
      if(isDep){var dot=document.createElement('span');dot.textContent='●';dot.style.cssText='font-size:8px;color:'+c+';';card.appendChild(dot);}
      if(!isDep){card.addEventListener('dragstart',function(ev){ev.dataTransfer.setData('text/plain',e.id);ev.dataTransfer.effectAllowed='move';});}
      el.appendChild(card);
    });
  });
  if(!Object.keys(gr).length)el.innerHTML='<div style="text-align:center;color:#bbb;padding:20px;font-size:12px;">No staff in your access list</div>';
}
function drawVP(){
  var el=g('LIST');if(!el)return;el.innerHTML='';
  var q=(g('SRCH').value||'').toLowerCase(),mvts=myVTs();
  var cntEl=g('CNT');if(cntEl)cntEl.textContent=mvts.length;
  mvts.forEach(function(vt,i){
    var c=CLRS[i%CLRS.length],cos=VCO[vt.id]||[];if(!cos.length)return;
    var hdr=document.createElement('div');hdr.className='rh';hdr.style.color=c;hdr.textContent=(vt.icon||'')+'  '+vt.name;el.appendChild(hdr);
    if(vt.special==='photovideo'){
      cos.forEach(function(co){
        var ch=document.createElement('div');ch.style.cssText='font-size:11px;font-weight:800;color:#111;padding:4px 4px 2px;';ch.textContent='📁 '+co;el.appendChild(ch);
        PVS.forEach(function(svc){
          var card=document.createElement('div');card.draggable=true;card.setAttribute('data-vtid',vt.id);card.setAttribute('data-co',co);card.setAttribute('data-svc',svc);
          card.style.cssText='background:'+c+'12;border-left:3px solid '+c+';border-bottom:1px solid '+c+'22;padding:3px 5px 3px 14px;display:flex;align-items:center;gap:4px;cursor:grab;margin-bottom:2px;';
          card.innerHTML='<div style="font-size:9px;font-weight:700;color:#111;flex:1;">'+esc(svc)+'</div><span style="font-size:8px;color:#888;">⠿</span>';
          card.addEventListener('dragstart',function(ev){ev.dataTransfer.setData('text/vc',JSON.stringify({tid:vt.id,co:co,svc:svc}));ev.dataTransfer.effectAllowed='move';});
          el.appendChild(card);
        });
      });
    } else {
      cos.forEach(function(co){
        if(q&&co.toLowerCase().indexOf(q)<0)return;
        var card=document.createElement('div');card.draggable=true;card.setAttribute('data-vtid',vt.id);card.setAttribute('data-co',co);
        card.style.cssText='background:'+c+'12;border-left:3px solid '+c+';border-bottom:1px solid '+c+'22;padding:3px 5px 3px 6px;display:flex;align-items:center;gap:4px;cursor:grab;margin-bottom:2px;';
        card.innerHTML='<div style="font-size:9px;font-weight:700;color:#111;flex:1;">'+esc(co)+'</div>';
        card.addEventListener('dragstart',function(ev){ev.dataTransfer.setData('text/vc',JSON.stringify({tid:vt.id,co:co,svc:null}));ev.dataTransfer.effectAllowed='move';});
        el.appendChild(card);
      });
    }
  });
  if(!mvts.length)el.innerHTML='<div style="text-align:center;color:#bbb;padding:20px;font-size:12px;">No vendor types assigned</div>';
}
function drawGrid(){
  var el=g('GRID');if(!el)return;el.innerHTML='';
  var msids=new Set(myS().map(function(e){return e.id;}));
  var mvtids=new Set(myVTs().map(function(vt){return vt.id;}));
  var rel=[];
  allV.forEach(function(v){
    var hs=Object.keys(asgn[v.id]||{}).some(function(eid){return msids.has(eid);});
    var hv=Object.keys(vAsgn[v.id]||{}).some(function(tid){return mvtids.has(tid);});
    if(hs||hv)rel.push(v);
  });
  rel.sort(function(a,b){
    var ca=Object.keys(asgn[a.id]||{}).filter(function(eid){return msids.has(eid);}).length;
    var cb=Object.keys(asgn[b.id]||{}).filter(function(eid){return msids.has(eid);}).length;
    return cb-ca;
  });
  if(!rel.length){
    var hint=document.createElement('div');
    hint.style.cssText='text-align:center;color:#bbb;padding:60px 20px;font-size:14px;grid-column:1/-1;';
    hint.innerHTML='<div style="font-size:40px;margin-bottom:12px;">🏨</div><div>No venues with your team yet.</div>';
    el.appendChild(hint);return;
  }
  rel.forEach(function(v){el.appendChild(makeBox(v,msids,mvtids));});
}
function makeBox(v,msids,mvtids){
  var wrap=document.createElement('div');
  var box=document.createElement('div');box.className='vbox';
  var myTeam=Object.keys(asgn[v.id]||{}).map(function(eid){var a=asgn[v.id][eid];return a&&msids.has(eid)?a:null;}).filter(Boolean);
  var myVC=0;Object.keys(vAsgn[v.id]||{}).forEach(function(tid){if(mvtids.has(tid)&&Array.isArray(vAsgn[v.id][tid]))myVC+=vAsgn[v.id][tid].length;});
  var hdr=document.createElement('div');hdr.className='vbh';
  hdr.innerHTML='<div class="vbn">'+esc(v.name)+'</div><span class="vbc">'+myTeam.length+' staff'+(myVC?' · '+myVC+' v':'')+'</span>';
  box.appendChild(hdr);
  var body=document.createElement('div');body.className='vbb';
  if(myTeam.length){
    var gr={};myTeam.forEach(function(a){if(!gr[a.emp.role])gr[a.emp.role]=[];gr[a.emp.role].push(a);});
    Object.keys(gr).forEach(function(r){
      var c=cc(r);
      var rh=document.createElement('div');rh.style.cssText='font-size:8px;font-weight:800;text-transform:uppercase;color:'+c+';padding:3px 2px 2px;border-bottom:1px solid '+c+'22;margin-bottom:3px;';rh.textContent=r;body.appendChild(rh);
      gr[r].forEach(function(a){
        var row=document.createElement('div');row.style.cssText='background:'+c+'12;border-left:3px solid '+c+';border-bottom:1px solid '+c+'22;padding:3px 5px 3px 6px;display:flex;align-items:center;gap:4px;';
        var nm=document.createElement('div');nm.style.cssText='font-size:9px;font-weight:700;color:#111;flex:1;word-break:break-word;';nm.textContent=a.emp.name;
        var sel=document.createElement('select');sel.style.cssText='flex-shrink:0;background:#f0f4ff;border:1px solid #bbdefb;border-radius:4px;color:#0d47a1;padding:1px;font-size:8px;width:38px;';
        TMS.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=st(t);if(t===a.duty)o.selected=true;sel.appendChild(o);});
        sel.addEventListener('change',(function(vid,eid){return function(){if(asgn[vid]&&asgn[vid][eid]){asgn[vid][eid].duty=this.value;save();};};})(v.id,a.emp.id));
        var rm=document.createElement('button');rm.style.cssText='flex-shrink:0;width:14px;height:14px;background:#ffebee;border:none;color:#c62828;border-radius:3px;cursor:pointer;font-size:8px;';rm.textContent='✕';
        rm.addEventListener('click',(function(vid,eid,en){return function(){
          sm('<div class="mtt" style="color:#c62828;">Remove Staff?</div><p style="text-align:center;margin-bottom:16px;">Remove <strong>'+esc(en)+'</strong> from <strong>'+esc(v.name)+'</strong>?</p><button class="mbtn p" id="MY">Yes</button><button class="mbtn c" id="MN">Cancel</button>');
          g('MY').onclick=function(){delete asgn[vid][eid];cm();drawGrid();drawSP();save();};g('MN').onclick=cm;
        };})(v.id,a.emp.id,a.emp.name));

      qi.addEventListener('change',(function(vid,tid,i2){return function(){if(vAsgn[vid]&&vAsgn[vid][tid])vAsgn[vid][tid][i2].qty=parseInt(this.value)||1;save();};})(v.id,vt.id,idx));
      var ts=document.createElement('select');ts.style.cssText='border:1px solid '+c+'55;border-radius:5px;padding:1px 2px;font-size:8px;color:'+c+';width:38px;';

      ts.addEventListener('change',(function(vid,tid,i2){return function(){if(vAsgn[vid]&&vAsgn[vid][tid])vAsgn[vid][tid][i2].time=this.value;save();};})(v.id,vt.id,idx));
      ff.appendChild(qi);ff.appendChild(ts);vr.appendChild(ff);
      var ni=document.createElement('textarea');ni.placeholder='📝 Notes...';ni.value=en.notes||'';ni.rows=1;ni.style.cssText='width:100%;border:1px solid '+c+'22;border-radius:5px;padding:3px 6px;font-size:10px;margin-top:3px;resize:none;overflow:hidden;';
      ni.addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px';});
      ni.addEventListener('change',(function(vid,tid,i2){return function(){if(vAsgn[vid]&&vAsgn[vid][tid])vAsgn[vid][tid][i2].notes=this.value.trim();save();};})(v.id,vt.id,idx));
      vr.appendChild(ni);body.appendChild(vr);
    });
  });
  if(!myTeam.length&&!myVC){var dh=document.createElement('div');dh.className='dh';dh.textContent='Your team appears here';body.appendChild(dh);}
  box.appendChild(body);
  box.addEventListener('dragover',function(ev){ev.preventDefault();box.classList.add('drag-over');});

    ev.preventDefault();box.classList.remove('drag-over');

    var eid=ev.dataTransfer.getData('text/plain');
    if(eid&&msids.has(eid)){var emp=gS(eid);if(emp){if(!asgn[v.id])asgn[v.id]={};asgn[v.id][eid]={emp:emp,duty:emp.fixedDuty||'6:00 AM'};if(navigator.vibrate)navigator.vibrate([20,10,20]);drawGrid();drawSP();save();}}
  });
  wrap.appendChild(box);return wrap;
}
function addVC(p,vid){
  var vt=myVTs().find(function(x){return x.id===p.tid;});if(!vt)return;
  if(!vAsgn[vid])vAsgn[vid]={};if(!vAsgn[vid][p.tid])vAsgn[vid][p.tid]=[];
  var isDup=vAsgn[vid][p.tid].some(function(e){return e.company===p.co&&e.serviceLabel===p.svc;});
  if(isDup){alert('Already assigned');return;}
  var en={company:p.co,qty:1,time:'9:00 AM',notes:''};if(p.svc)en.serviceLabel=p.svc;
  vAsgn[vid][p.tid].push(en);drawGrid();save();
}
